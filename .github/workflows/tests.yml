name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        # Only the runtime deps the tested modules import, plus the test tools.
        # The heavy app (CLI/scheduler/Celery) is never invoked.
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml pyyaml python-dateutil
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests with coverage
        run: |
          pytest -q \
            --cov=monitoring.ai_change_detector \
            --cov=monitoring.structure_validator \
            --cov=monitoring.alert_sender \
            --cov=monitoring.source_health_checker \
            --cov-report=term-missing

      - name: Print coverage summary
        if: always()
        run: |
          coverage report || true
